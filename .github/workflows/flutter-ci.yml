name: Full Flutter CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    with:
      # [nocos] flipped true on this branch so the i686 sciter + x86_64
      # flutter Windows jobs publish their .exe/.msi artifacts for
      # dogfood download. Master keeps `false`.
      upload-artifact: true
      upload-tag: "nocos-dev-build"
